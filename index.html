<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>注文完了</title>
</head>
<body style="text-align:center; font-family:sans-serif; margin-top:50px;">

  <h1>🎉 ご注文ありがとうございます！</h1>

  <p style="font-size:24px;">あなたの注文番号</p>

  <h2 id="order" style="font-size:80px; color:red;"></h2>

  <!-- 🔥 ここ追加 -->
  <p style="font-size:22px; color:red; font-weight:bold; margin-top:30px;">
    ※この画面を閉じず、他のアプリ等を開かないでください
  </p>

  <p>※この番号でお呼びします</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    let num = params.get("no");

    if(!num){
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      const s = now.getSeconds().toString().padStart(2, '0');
      num = h + m + s;
    }

    document.getElementById("order").textContent = num;
  </script>

</body>
</html>
